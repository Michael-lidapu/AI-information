<style>
/* ═══════════════════════════════════════════════════
   CSS 变量
═══════════════════════════════════════════════════ */
:root {
  --color-success:#059669; --color-success-light:#10B981; --color-success-dark:#047857;
  --color-success-50:#ECFDF5; --color-success-100:#D1FAE5;
  --color-info:#2563EB; --color-info-light:#3B82F6;
  --color-info-50:#EFF6FF; --color-info-100:#DBEAFE;
  --color-purple:#7C3AED; --color-purple-light:#8B5CF6;
  --color-purple-50:#F5F3FF; --color-purple-100:#EDE9FE;
  --color-danger:#E11D48; --color-danger-light:#F43F5E; --color-danger-50:#FFF1F2;
  --color-warning:#D97706; --color-warning-light:#F59E0B; --color-warning-50:#FFFBEB;
  --color-text-primary:#1C1917; --color-text-secondary:#44403C;
  --color-text-muted:#78716C; --color-text-placeholder:#A8A29E;
  --color-border:#E7E5E4; --color-border-light:#F5F5F4;
  --color-bg:#F8FAFB; --color-bg-card:#FFFFFF; --color-bg-table:#FAFAF9;
  --color-bg-hover:rgba(0,0,0,0.025);
  --gradient-hero:linear-gradient(135deg,#059669 0%,#2563EB 50%,#7C3AED 100%);
  --gradient-success:linear-gradient(135deg,#059669,#10B981);
  --gradient-badge:linear-gradient(135deg,#ECFDF5,#EFF6FF);
  --gradient-mesh:
    radial-gradient(at 20% 20%,rgba(5,150,105,0.07) 0%,transparent 50%),
    radial-gradient(at 80% 80%,rgba(37,99,235,0.05) 0%,transparent 50%),
    radial-gradient(at 50% 50%,rgba(124,58,237,0.04) 0%,transparent 50%);
  --shadow-xs:0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-card:0 2px 8px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-float:0 12px 32px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.06);
  --shadow-hover:0 8px 24px rgba(5,150,105,0.15),0 2px 8px rgba(5,150,105,0.08);
  --shadow-glow-purple:0 4px 14px rgba(124,58,237,0.20);
  --shadow-glow-info:0 4px 14px rgba(37,99,235,0.15);
  --spacing-xs:4px; --spacing-sm:8px; --spacing-md:16px;
  --spacing-lg:24px; --spacing-xl:32px; --spacing-2xl:40px; --spacing-3xl:48px;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
  --radius-xl:20px; --radius-full:9999px;
  --font-family:"DM Sans",-apple-system,"Noto Sans SC","PingFang SC",sans-serif;
  --font-family-heading:"DM Sans",-apple-system,"SF Pro Display","Noto Sans SC",sans-serif;
  --font-family-cn:"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --font-family-mono:"JetBrains Mono","SF Mono","Fira Code","Consolas",monospace;
  --transition-fast:150ms cubic-bezier(0.4,0,0.2,1);
  --transition-normal:200ms cubic-bezier(0.4,0,0.2,1);
  --transition-spring:420ms cubic-bezier(0.34,1.56,0.64,1);
  --sidebar-width:228px; --content-max:920px; --content-pad:56px;
}

/* ═══════════════════════════════════════════════════
   Reset + Base
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-family);font-size:15px;line-height:1.65;
  color:var(--color-text-secondary);background:var(--color-bg);
  background-image:var(--gradient-mesh);background-attachment:fixed;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
@media(max-width:768px){body{background-attachment:scroll;}}
::selection{background:rgba(124,58,237,0.15);}
a{color:var(--color-info);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ═══════════════════════════════════════════════════
   Skip-to-content
═══════════════════════════════════════════════════ */
.skip-link{
  position:fixed;top:-100%;left:16px;z-index:9999;
  background:var(--color-info);color:#fff;
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;transition:top var(--transition-fast);
}
.skip-link:focus{top:12px;}

/* ═══════════════════════════════════════════════════
   Layout
═══════════════════════════════════════════════════ */
.layout-wrapper{display:flex;min-height:100vh;}

/* ─── Sidebar ─── */
.sidebar-nav{
  width:var(--sidebar-width);min-width:var(--sidebar-width);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:#fff;border-right:1px solid var(--color-border);
  display:flex;flex-direction:column;flex-shrink:0;z-index:100;
  transition:width .28s ease,min-width .28s ease,opacity .28s ease;
}
.sidebar-nav::-webkit-scrollbar{width:4px;}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:2px;}
.sidebar-nav::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.15);}
.sidebar-nav.sidebar-collapsed{width:0;min-width:0;opacity:0;pointer-events:none;overflow:hidden;}

.sidebar-inner{padding:20px 0 0;flex:1;display:flex;flex-direction:column;min-height:0;}
.sidebar-doc-title{
  font-size:13px;font-weight:700;color:var(--color-text-primary);
  padding:0 20px 3px;line-height:1.4;font-family:var(--font-family-heading);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sidebar-doc-sub{font-size:11px;color:var(--color-text-placeholder);padding:0 20px 14px;}

.toc-section{flex:1;overflow-y:auto;padding-bottom:8px;}
.toc-group-label{
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--color-text-placeholder);padding:12px 20px 6px;
}
.toc-link{
  display:block;padding:6px 20px;font-size:13px;font-weight:500;
  color:var(--color-text-secondary);border-left:2px solid transparent;
  transition:all var(--transition-fast);line-height:1.45;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;text-decoration:none;
}
.toc-link:hover{background:rgba(0,0,0,0.03);color:var(--color-text-primary);text-decoration:none;}
.toc-link.toc-active{
  color:var(--color-purple);border-left-color:var(--color-purple);
  background:rgba(124,58,237,0.04);font-weight:600;
}
.toc-link.toc-sub{padding-left:32px;font-size:12px;font-weight:400;color:var(--color-text-muted);}
.toc-link.toc-sub.toc-active{color:var(--color-purple);font-weight:500;}
.toc-link:focus-visible{outline:2px solid var(--color-purple);outline-offset:-2px;}

.reading-progress-wrap{
  margin-top:auto;padding:12px 16px 18px;flex-shrink:0;
  border-top:1px solid var(--color-border-light);
}
.reading-progress-label{
  font-size:10px;color:var(--color-text-placeholder);font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;
}
.reading-progress-track{height:3px;background:var(--color-border);border-radius:var(--radius-full);overflow:hidden;}
.reading-progress-fill{
  height:100%;background:var(--gradient-hero);
  border-radius:var(--radius-full);width:0%;transition:width .2s ease;
}

/* ─── Collapse Button ─── */
.sidebar-collapse-btn{
  position:fixed;top:16px;left:calc(var(--sidebar-width) - 13px);
  width:26px;height:26px;border-radius:50%;background:#fff;
  border:1px solid var(--color-border);cursor:pointer;
  font-size:12px;font-weight:700;color:var(--color-text-muted);
  display:flex;align-items:center;justify-content:center;z-index:300;
  transition:left .28s ease,color var(--transition-fast),box-shadow var(--transition-fast);
  box-shadow:var(--shadow-xs);
}
.sidebar-collapse-btn:hover{color:var(--color-text-primary);box-shadow:var(--shadow-sm);}
.sidebar-collapse-btn.collapsed-pos{left:8px;}

/* ─── Content Area ─── */
.content-area{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;}
.content-inner{width:100%;max-width:var(--content-max);padding:52px var(--content-pad) 120px;}

/* ─── Responsive ─── */
@media(max-width:1100px){:root{--content-pad:40px;}}
@media(max-width:900px){:root{--content-pad:28px;}}
@media(max-width:768px){
  .sidebar-nav{position:fixed;transform:translateX(-100%);transition:transform .28s ease;box-shadow:var(--shadow-lg);}
  .sidebar-nav.mobile-open{transform:translateX(0);}
  .sidebar-collapse-btn{left:12px!important;}
  .content-area{align-items:stretch;}
  .content-inner{padding:52px 16px 80px;}
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90;}
@media(max-width:768px){.sidebar-overlay.active{display:block;}}

/* ═══════════════════════════════════════════════════
   Document Header
═══════════════════════════════════════════════════ */
.doc-header{
  margin-bottom:44px;padding-bottom:32px;
  border-bottom:1px solid var(--color-border-light);position:relative;
}
.doc-header::before{
  content:'';position:absolute;top:0;
  left:calc(-1 * var(--content-pad));right:calc(-1 * var(--content-pad));
  height:3px;background:var(--gradient-hero);
}
.doc-eyebrow{
  display:inline-flex;align-items:center;gap:7px;padding:4px 14px;
  background:var(--gradient-badge);border:1px solid rgba(124,58,237,0.15);
  border-radius:var(--radius-full);font-size:11px;font-weight:700;
  color:var(--color-purple);letter-spacing:0.04em;margin-bottom:18px;
}
.doc-title{
  font-family:var(--font-family-heading);font-size:clamp(26px,4vw,36px);
  font-weight:800;letter-spacing:-0.025em;color:var(--color-text-primary);
  line-height:1.2;text-wrap:balance;margin-bottom:14px;
}
.doc-title em{
  font-style:normal;background:var(--gradient-hero);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.doc-lead{
  font-family:var(--font-family-cn);font-size:16px;
  color:var(--color-text-muted);line-height:1.8;
  max-width:640px;margin-bottom:20px;
}
.doc-meta{display:flex;flex-wrap:wrap;gap:18px;font-size:12px;color:var(--color-text-placeholder);}
.doc-meta span{display:flex;align-items:center;gap:5px;}

/* ═══════════════════════════════════════════════════
   Chapter Label（带右延伸线）
═══════════════════════════════════════════════════ */
.doc-chapter-label{
  display:flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--color-text-placeholder);padding:48px 0 14px;
  font-family:var(--font-family-heading);
}
.doc-chapter-label::after{content:'';flex:1;height:1px;background:var(--color-border-light);}

/* ═══════════════════════════════════════════════════
   Stat Cards（颜色顶边，v5.0）
═══════════════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:40px;}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--color-bg-card);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:18px 16px 16px;text-align:center;
  box-shadow:var(--shadow-sm);
  border-top:3px solid var(--stat-accent,var(--color-border));
  transition:box-shadow var(--transition-normal),transform var(--transition-normal);
  will-change:transform;
}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.stat-info{--stat-accent:#2563EB;} .stat-success{--stat-accent:#059669;}
.stat-warning{--stat-accent:#D97706;} .stat-purple{--stat-accent:#7C3AED;}
.stat-danger{--stat-accent:#E11D48;}
.stat-value{
  font-size:28px;font-weight:800;line-height:1.1;
  font-variant-numeric:tabular-nums;font-family:var(--font-family-heading);
  color:var(--color-text-primary);margin-bottom:4px;
}
.stat-value.v-purple{color:var(--color-purple);} .stat-value.v-info{color:var(--color-info);}
.stat-value.v-green{color:var(--color-success);} .stat-value.v-amber{color:var(--color-warning);}
.stat-label{font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;}

/* Stagger */
.stagger-2{transition-delay:.06s;} .stagger-3{transition-delay:.12s;}
.stagger-4{transition-delay:.18s;} .stagger-5{transition-delay:.24s;}
.stagger-6{transition-delay:.30s;}

/* ═══════════════════════════════════════════════════
   Section Card
═══════════════════════════════════════════════════ */
.section{
  background:var(--color-bg-card);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:var(--spacing-lg) 28px;
  box-shadow:var(--shadow-card);margin-bottom:16px;
}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:var(--spacing-md);padding-bottom:var(--spacing-md);
  border-bottom:1px solid var(--color-border-light);
}
.section-icon{
  width:34px;height:34px;background:var(--gradient-badge);
  border-radius:var(--radius-sm);display:flex;align-items:center;
  justify-content:center;font-size:17px;flex-shrink:0;
}
.section-title{font-size:17px;font-weight:700;color:var(--color-text-primary);font-family:var(--font-family-heading);}
.section-sub{font-size:12px;color:var(--color-text-muted);margin-top:2px;}

/* ═══════════════════════════════════════════════════
   Callout / Insight
═══════════════════════════════════════════════════ */
.callout{
  display:flex;gap:12px;align-items:flex-start;padding:15px 18px;
  border-radius:var(--radius-md);margin:14px 0;font-size:14px;
  line-height:1.75;color:var(--color-text-secondary);font-family:var(--font-family-cn);
}
.callout-purple{background:rgba(124,58,237,0.06);border-left:3px solid var(--color-purple);}
.callout-info{background:rgba(37,99,235,0.06);border-left:3px solid var(--color-info);}
.callout-success{background:rgba(5,150,105,0.06);border-left:3px solid var(--color-success);}
.callout-warning{background:rgba(217,119,6,0.06);border-left:3px solid var(--color-warning);}
.callout-icon{font-size:17px;flex-shrink:0;line-height:1.4;}
.callout strong{color:var(--color-text-primary);}
.callout-title{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:7px;}
.ct-purple{color:var(--color-purple);} .ct-green{color:var(--color-success);}
.ct-amber{color:var(--color-warning);} .ct-blue{color:var(--color-info);}

.insight-block{border-radius:var(--radius-lg);padding:18px 22px;margin:16px 0;}
.ib-purple{background:linear-gradient(135deg,var(--color-purple-50),#fff);border:1px solid var(--color-purple-100);}
.ib-green{background:linear-gradient(135deg,var(--color-success-50),#fff);border:1px solid var(--color-success-100);}
.ib-blue{background:linear-gradient(135deg,var(--color-info-50),#fff);border:1px solid var(--color-info-100);}
.ib-amber{background:linear-gradient(135deg,var(--color-warning-50),#fff);border:1px solid rgba(217,119,6,0.2);}
.ib-title{font-size:12px;font-weight:700;margin-bottom:8px;}
.ib-body{font-size:13px;color:var(--color-text-secondary);line-height:1.75;font-family:var(--font-family-cn);}

/* ═══════════════════════════════════════════════════
   Two-col compare
═══════════════════════════════════════════════════ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md);}
@media(max-width:640px){.two-col{grid-template-columns:1fr;}}
.col-card{
  border-radius:var(--radius-lg);padding:var(--spacing-lg) 20px;
  border:1px solid var(--color-border);
  transition:box-shadow var(--transition-normal),transform var(--transition-normal);
}
.col-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.col-card.cc-purple{border-left:3px solid var(--color-purple);}
.col-card.cc-blue{border-left:3px solid var(--color-info);}
.col-card.cc-green{border-left:3px solid var(--color-success);}
.col-card.cc-amber{border-left:3px solid var(--color-warning);}
.col-card.cc-rose{border-left:3px solid var(--color-danger);}
.col-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.col-title{font-size:15px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px;font-family:var(--font-family-heading);}
.col-body{font-size:13px;color:var(--color-text-secondary);line-height:1.75;font-family:var(--font-family-cn);}
.col-formula{
  margin-top:10px;background:var(--color-bg);border:1px solid var(--color-border-light);
  border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;
  font-family:var(--font-family-mono);color:var(--color-text-primary);
}

/* ═══════════════════════════════════════════════════
   规律映射表
═══════════════════════════════════════════════════ */
.map-table{display:flex;flex-direction:column;gap:10px;}
.map-row{display:grid;grid-template-columns:1fr 32px 1fr;align-items:center;gap:10px;}
@media(max-width:600px){.map-row{grid-template-columns:1fr;}}
.map-cell{border-radius:var(--radius-md);padding:13px 15px;}
.map-left{background:linear-gradient(135deg,var(--color-purple-50),#fff);border:1px solid var(--color-purple-100);}
.map-right{background:linear-gradient(135deg,var(--color-success-50),#fff);border:1px solid var(--color-success-100);}
.map-arrow{font-size:18px;color:var(--color-text-placeholder);text-align:center;}
.map-label-tag{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.ml-rule{color:var(--color-purple);} .ml-impl{color:var(--color-success);}
.map-text{font-size:13px;font-weight:600;color:var(--color-text-primary);line-height:1.5;}
.map-detail{font-size:12px;color:var(--color-text-muted);margin-top:3px;line-height:1.5;font-family:var(--font-family-cn);}

/* ═══════════════════════════════════════════════════
   三层架构
═══════════════════════════════════════════════════ */
.layer-stack{display:flex;flex-direction:column;gap:6px;}
.layer-block{border-radius:var(--radius-lg);padding:20px 24px;}
.lb-l3{background:linear-gradient(135deg,#1e1b4b,#312e81);}
.lb-l2{background:linear-gradient(135deg,#1D4ED8,#2563EB);}
.lb-l1{background:linear-gradient(135deg,#047857,#059669);}
.layer-tag{
  display:inline-block;padding:3px 10px;border-radius:var(--radius-full);
  font-size:10px;font-weight:700;background:rgba(255,255,255,0.18);
  color:white;margin-bottom:10px;letter-spacing:0.04em;
}
.layer-name{font-size:16px;font-weight:800;color:white;margin-bottom:5px;}
.layer-desc{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:14px;font-family:var(--font-family-cn);}
.layer-chips{display:flex;flex-wrap:wrap;gap:6px;}
.lchip{padding:4px 11px;background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.22);border-radius:var(--radius-full);font-size:12px;color:white;}
.lchip.star{background:rgba(255,255,255,0.30);font-weight:700;}
.layer-arrow{text-align:center;color:var(--color-text-muted);font-size:15px;padding:3px 0;letter-spacing:2px;}

/* ═══════════════════════════════════════════════════
   六层引擎图
═══════════════════════════════════════════════════ */
.engine-diagram{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:16px;overflow-x:auto;}
.eng-row{display:flex;align-items:stretch;gap:8px;margin-bottom:8px;}
.eng-row:last-child{margin-bottom:0;}
.eng-label{
  width:76px;min-width:76px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:white;border-radius:var(--radius-sm);
  padding:8px 4px;text-align:center;line-height:1.4;
}
.el-green{background:var(--color-success);} .el-blue{background:var(--color-info);}
.el-amber{background:var(--color-warning);} .el-purple{background:var(--color-purple);}
.el-slate{background:#64748B;} .el-rose{background:var(--color-danger);}
.eng-cells{display:flex;flex:1;gap:6px;flex-wrap:wrap;}
.ecell{
  background:var(--color-bg-card);border:1px solid var(--color-border);
  border-radius:var(--radius-sm);padding:8px 12px;flex:1;min-width:120px;
}
.ecell.core{border-color:var(--color-warning);background:var(--color-warning-50);}
.ecell.new-green{border-color:var(--color-success);background:var(--color-success-50);}
.ecell.new-blue{border-color:var(--color-info);background:var(--color-info-50);}
.ecell.new-purple{border-color:var(--color-purple);background:var(--color-purple-50);}
.ecell .cn{font-weight:700;font-size:12px;color:var(--color-text-primary);margin-bottom:2px;}
.ecell .cd{font-size:11px;color:var(--color-text-muted);font-family:var(--font-family-cn);}
.ecell.core .cn{color:var(--color-warning);}
.ecell.new-green .cn{color:var(--color-success);}
.ecell.new-blue .cn{color:var(--color-info);}
.ecell.new-purple .cn{color:var(--color-purple);}

/* ═══════════════════════════════════════════════════
   Tags
═══════════════════════════════════════════════════ */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:var(--radius-full);
  font-size:11px;font-weight:500;white-space:nowrap;
}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.tag-nd::before{display:none;}
.tag-success{background:rgba(5,150,105,0.10);color:var(--color-success);}
.tag-info{background:rgba(37,99,235,0.10);color:var(--color-info);}
.tag-purple{background:rgba(124,58,237,0.10);color:var(--color-purple);}
.tag-warning{background:rgba(217,119,6,0.10);color:var(--color-warning);}
.tag-neutral{background:rgba(120,113,108,0.10);color:var(--color-text-muted);}
.tag-danger{background:rgba(225,29,72,0.10);color:var(--color-danger);}

/* ═══════════════════════════════════════════════════
   完备性维度行
═══════════════════════════════════════════════════ */
.dim-row{
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:12px;background:var(--color-bg-card);box-shadow:var(--shadow-sm);
}
.dim-head{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--color-border-light);}
.dim-title{font-size:14px;font-weight:700;color:var(--color-text-primary);}
.dim-sub{font-size:11px;color:var(--color-text-muted);margin-top:1px;}
.dim-body{padding:12px 18px;display:flex;flex-wrap:wrap;gap:8px;}

/* ═══════════════════════════════════════════════════
   Table
═══════════════════════════════════════════════════ */
.table-wrapper{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--color-border);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--color-bg-table);border-bottom:1.5px solid var(--color-border);}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--color-border-light);font-size:13px;color:var(--color-text-secondary);vertical-align:middle;}
tbody tr:hover{background:var(--color-bg-hover);}
tbody tr:last-child td{border-bottom:none;}

/* ═══════════════════════════════════════════════════
   Design Cards（隐藏设计）
═══════════════════════════════════════════════════ */
.design-card{
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  overflow:hidden;background:var(--color-bg-card);box-shadow:var(--shadow-sm);margin-bottom:14px;
}
.design-card.highlighted{border:2px solid var(--color-success-100);background:linear-gradient(135deg,var(--color-success-50),#fff);}
.design-card.highlighted-blue{border:2px solid var(--color-info-100);background:linear-gradient(135deg,var(--color-info-50),#fff);}
.design-card.highlighted-purple{border:2px solid var(--color-purple-100);background:linear-gradient(135deg,var(--color-purple-50),#fff);}
.design-card-head{padding:15px 20px 12px;border-bottom:1px solid var(--color-border-light);display:flex;align-items:center;gap:12px;}
.design-num{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:14px;flex-shrink:0;}
.dn-purple{background:linear-gradient(135deg,#312e81,#4C1D95);}
.dn-blue{background:linear-gradient(135deg,#1D4ED8,#2563EB);}
.dn-green{background:linear-gradient(135deg,#047857,#059669);}
.dn-amber{background:linear-gradient(135deg,#B45309,#D97706);}
.dn-rose{background:linear-gradient(135deg,#BE123C,#E11D48);}
.dn-teal{background:linear-gradient(135deg,#0F766E,#0D9488);}
.dn-slate{background:linear-gradient(135deg,#334155,#475569);}
.design-card-title{font-size:15px;font-weight:700;color:var(--color-text-primary);font-family:var(--font-family-heading);}
.design-card-hint{font-size:11px;color:var(--color-text-muted);margin-top:2px;}
.design-card-body{padding:14px 20px;font-size:13px;color:var(--color-text-secondary);line-height:1.8;font-family:var(--font-family-cn);}
.design-card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}

/* ═══════════════════════════════════════════════════
   源泉卡
═══════════════════════════════════════════════════ */
.src-card{
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:18px 22px;margin-bottom:12px;background:var(--color-bg-card);
  box-shadow:var(--shadow-sm);transition:box-shadow var(--transition-normal);
}
.src-card:hover{box-shadow:var(--shadow-md);}
.src-card.src-special{background:linear-gradient(135deg,var(--color-warning-50),#fff);border-color:rgba(217,119,6,0.2);}
.src-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.src-year{font-size:11px;font-weight:700;color:var(--color-text-placeholder);}
.src-name{font-size:15px;font-weight:700;color:var(--color-text-primary);font-family:var(--font-family-heading);}
.src-body{font-size:13px;color:var(--color-text-secondary);line-height:1.75;margin-bottom:8px;font-family:var(--font-family-cn);}

/* ═══════════════════════════════════════════════════
   Progress Bar
═══════════════════════════════════════════════════ */
.progress-item{margin-bottom:14px;}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.progress-label{font-size:13px;font-weight:500;color:var(--color-text-secondary);}
.progress-value{font-size:13px;font-weight:700;color:var(--color-text-primary);font-variant-numeric:tabular-nums;}
.progress-track{height:7px;background:var(--color-bg);border-radius:var(--radius-full);overflow:hidden;border:1px solid var(--color-border-light);}
.bar-fill{height:100%;border-radius:var(--radius-full);background:var(--gradient-success);width:0%;transition:width 1.2s cubic-bezier(.25,.46,.45,.94);}
.bar-fill.bf-blue{background:linear-gradient(90deg,var(--color-info),var(--color-info-light));}
.bar-fill.bf-purple{background:linear-gradient(90deg,var(--color-purple),var(--color-purple-light));}
.bar-fill.bf-amber{background:linear-gradient(90deg,var(--color-warning),var(--color-warning-light));}

/* ═══════════════════════════════════════════════════
   Nav Cards（概览导读）
═══════════════════════════════════════════════════ */
.nav-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:560px){.nav-cards-grid{grid-template-columns:1fr;}}
.nav-card{
  display:flex;align-items:center;gap:14px;padding:15px 18px;
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  background:var(--color-bg-card);cursor:pointer;text-decoration:none;
  transition:box-shadow var(--transition-normal),transform var(--transition-normal),border-color var(--transition-normal);
  box-shadow:var(--shadow-sm);
}
.nav-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:rgba(124,58,237,0.2);text-decoration:none;}
.nav-card-icon{width:38px;height:38px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.nav-card-title{font-weight:700;color:var(--color-text-primary);font-size:14px;margin-bottom:3px;}
.nav-card-desc{font-size:12px;color:var(--color-text-muted);}
.nav-card-arrow{margin-left:auto;color:var(--color-text-placeholder);font-size:16px;}

.big-nums-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:500px){.big-nums-grid{grid-template-columns:1fr 1fr;}}
.big-num-cell{text-align:center;padding:20px 12px;border:1px solid var(--color-border-light);border-radius:var(--radius-lg);background:var(--color-bg-card);box-shadow:var(--shadow-sm);}
.big-num-val{font-size:32px;font-weight:800;line-height:1;font-family:var(--font-family-heading);font-variant-numeric:tabular-nums;}
.big-num-lbl{font-size:12px;color:var(--color-text-muted);margin-top:6px;}
.big-num-hint{font-size:11px;color:var(--color-text-placeholder);margin-top:3px;}

/* ═══════════════════════════════════════════════════
   Scroll animation
═══════════════════════════════════════════════════ */
.animate-on-scroll{opacity:0;transform:translateY(14px);transition:opacity .42s ease,transform .42s ease;}
.animate-on-scroll.visible{opacity:1;transform:translateY(0);}
@media(prefers-reduced-motion:reduce){.animate-on-scroll{transition:none;opacity:1;transform:none;}}

/* ═══════════════════════════════════════════════════
   Scroll-to-top
═══════════════════════════════════════════════════ */
.scroll-to-top{
  position:fixed;bottom:28px;right:28px;width:40px;height:40px;
  border-radius:50%;background:var(--color-purple);color:#fff;border:none;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-glow-purple);opacity:0;transform:translateY(10px);
  transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;
}
.scroll-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto;}

/* ═══════════════════════════════════════════════════
   Footer
═══════════════════════════════════════════════════ */
.doc-footer{
  text-align:center;padding:40px 0 16px;color:var(--color-text-placeholder);
  font-size:12px;line-height:2;border-top:1px solid var(--color-border-light);margin-top:40px;
}
.doc-footer strong{color:var(--color-text-muted);}
</style>
</head>
